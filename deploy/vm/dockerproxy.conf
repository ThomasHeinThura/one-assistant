# Minimal Docker-socket proxy for Traefik.
#
# Docker Engine 29 (API min 1.40) rejects Traefik's hardcoded /v1.24/ requests
# ("client version 1.24 is too old"), which breaks label discovery. This nginx
# rewrites any /v1.XX/ path prefix to a daemon-supported version before forwarding
# to the unix socket — no daemon restart needed (Outline VPN untouched).
#
# Hardening: read-only (GET/HEAD only) and only reachable by Traefik on an
# internal Docker network (never published to the host or the web network).

user  root;          # workers must read the root:docker-owned socket
worker_processes  1;
events { worker_connections 256; }

http {
    upstream dockersock { server unix:/var/run/docker.sock; }

    server {
        listen 2375;

        # Traefik only needs read access (list containers, watch /events, /info).
        if ($request_method !~ ^(GET|HEAD)$) { return 403; }

        location / {
            # Pin any versioned API path to a version the daemon supports (1.40–1.54).
            rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /v1.44/$1 break;
            proxy_pass http://dockersock;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;             # stream /events for live discovery
            proxy_read_timeout 3600s;
        }
    }
}
