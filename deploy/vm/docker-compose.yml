# Edge stack for the Azure VM: Traefik (reverse proxy + Let's Encrypt) + Dockge
# (compose management UI). Replaces the host nginx. Apps attach to the external
# `web` network and are routed by Traefik via Docker labels.
#
#   docker network create web        # once
#   docker compose up -d             # from deploy/vm/
#
# Certs: Let's Encrypt DNS-01 via Cloudflare (CF_DNS_API_TOKEN) — works behind the
# Cloudflare proxy (orange cloud), no port-80 dependency. Set SSL/TLS mode to
# Full (Strict) in Cloudflare so it trusts the LE cert on the origin.
name: maria-edge

networks:
  web:
    external: true
  dockerapi:          # isolated: only Traefik <-> dockerproxy
    internal: true

volumes:
  letsencrypt:

services:
  # nginx socket proxy: rewrites Traefik's old /v1.24/ API calls to a version the
  # new daemon (Engine 29, API min 1.40) accepts. Read-only, internal-only.
  dockerproxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dockerproxy.conf:/etc/nginx/nginx.conf:ro
    networks: [dockerapi]
    security_opt: ["no-new-privileges:true"]

  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    depends_on: [dockerproxy]
    # CF_DNS_API_TOKEN: scoped Cloudflare token (Zone.DNS:Edit + Zone:Read) for the
    # DNS-01 challenge. Works behind Cloudflare's proxy (no port-80 dependency).
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=web
      # Talk to the daemon through the version-rewriting proxy (not the raw socket).
      - --providers.docker.endpoint=tcp://dockerproxy:2375
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Force HTTPS: redirect all :80 -> :443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt via DNS-01 (Cloudflare) — works behind the CF proxy; no port 80.
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      # Dashboard on :8080, bound to localhost only (reach via SSH tunnel)
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"   # dashboard: ssh -L 8080:127.0.0.1:8080
    volumes:
      - letsencrypt:/letsencrypt
    networks: [web, dockerapi]
    # Hardened: drop all caps, re-add only privileged-port binding.
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    security_opt: ["no-new-privileges:true"]

  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dockge/data:/app/data
      - /opt/stacks:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
    networks: [web]
    labels:
      - traefik.enable=true
      - traefik.http.routers.dockge.rule=Host(`dockage.${DOMAIN}`)
      - traefik.http.routers.dockge.entrypoints=websecure
      - traefik.http.routers.dockge.tls.certresolver=le
      - traefik.http.services.dockge.loadbalancer.server.port=5001
    security_opt: ["no-new-privileges:true"]
