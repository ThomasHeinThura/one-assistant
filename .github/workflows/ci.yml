name: CI

# Gate every change on tests + CVE/secret scans (SECURITY.md §6).
on:
  push: { branches: [main] }
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt pytest
      - run: pytest -q

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python advisory DB — fail on known-vulnerable deps.
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt

      # Filesystem scan: deps + leaked secrets + IaC misconfig. Fail on HIGH/CRITICAL.
      # Pinned to 0.35.0+ — the Mar-2026 supply-chain incident force-pushed malware
      # to all tags < 0.35.0 (GHSA / Dependabot alert). 0.35.0 is the clean release.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'

  image-scan:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t maria-one-api:ci backend
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: maria-one-api:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
